# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: t1_latency_max
    status: active
    source: design/gdd/event-bus.md
    referenced_by:
      - design/gdd/event-bus.md
      - design/gdd/save-load.md
    value: 16.67
    unit: milliseconds
    notes: "Hard latency ceiling for T1-tier events (same-frame response). Derived from 60fps frame budget. Enforces Pillar 5 ('No Input Goes Silent') on input response, collection, slapstick hazards. AC-F4 + AC-P3 in Event Bus GDD; AC-F6 extends to end-to-end input→render. Save/Load explicitly opts OUT of T1 participation — async flushes run after feedback fires, not before."
    added: 2026-04-20
    revised: ""

  - name: t2_latency_max
    status: active
    source: design/gdd/event-bus.md
    referenced_by:
      - design/gdd/event-bus.md
      - design/gdd/save-load.md
    value: 100
    unit: milliseconds
    notes: "Feedback Floor budget (Pillar 5 contract). Applies to T2-tier events (state changes, economy updates, AI signals) AND to end-to-end input→render contract via AC-F6. VFX/Juice, HUD, Collection, Tool, Hazard, Critter AI GDDs must honor this. Save/Load explicitly opts OUT — save writes are a consequence of an input, not the input itself, and do not participate in the Feedback Floor."
    added: 2026-04-20
    revised: ""

  - name: feedback_channel_regex
    status: active
    source: design/gdd/data-registry.md
    referenced_by:
      - design/gdd/data-registry.md
      - design/gdd/event-bus.md
    value: "^(audio|vfx)\\.[a-z_]+\\.[a-z_]+\\.[a-z_]+$"
    unit: regex
    notes: "Format regex for Feedback-namespace event IDs in AudioEventTaxonomy and VisualEventTaxonomy. Enforced by Data Registry R7 at editor time; Event Bus R3 uses generated constants derived from these IDs. Any change requires migration of every emitting system's event ID string — treat as architecture change."
    added: 2026-04-20
    revised: ""

  - name: gameplay_channel_regex
    status: active
    source: design/gdd/event-bus.md
    referenced_by:
      - design/gdd/event-bus.md
      - design/gdd/save-load.md
    value: "^gameplay\\.[a-z_]+\\.[a-z_]+$"
    unit: regex
    notes: "Format regex for Gameplay-namespace event IDs (internal events: phase_changed, quota_progress, banked, gopher.launched, etc.). Event Bus R5 enforces namespace distinction from Feedback. Save/Load subscribes to gameplay.* channels as write triggers and proposes 7 new gameplay.* events (save-load.md OQ-4) that must be added to Event Bus's Section C Interactions table before implementation."
    added: 2026-04-20
    revised: ""

